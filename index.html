<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEKTRUM - 3D Baskı Fiyat Hesaplayıcı</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
        }
        h1 { color: #ff6b35; text-align: center; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #0f0f0f;
            border-radius: 8px;
            display: none;
        }
        .warning {
            color: #ffaa00;
            font-size: 12px;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #777;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📐 SPEKTRUM 3D</h1>
    <form id="quoteForm" enctype="multipart/form-data">
        <label>Ad Soyad</label>
        <input type="text" id="name" name="name" required>

        <label>E-posta</label>
        <input type="email" id="email" name="email" required>

        <label>Telefon (opsiyonel)</label>
        <input type="tel" id="phone" name="phone">

        <label>Malzeme</label>
        <select id="material" name="material">
            <option value="pla">PLA</option>
            <option value="petg">PETG</option>
            <option value="abs">ABS</option>
        </select>

        <label>Renk sayısı (max 4)</label>
        <input type="number" id="color_count" name="color_count" min="1" max="4" value="1">

        <label>Adet</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1">

        <label>3D Dosyanız (her format)</label>
        <input type="file" id="file" name="file" required>

        <label>Notlar</label>
        <textarea id="notes" name="notes" rows="2"></textarea>

        <button type="submit">💰 Fiyat Hesapla</button>
    </form>

    <div id="result" class="result">
        <h3>📋 Fiyat Teklifi</h3>
        <div id="resultContent"></div>
        <button id="confirmBtn" style="background: #28a745;">✅ Siparişi Onayla</button>
        <div id="warningMsg" class="warning"></div>
    </div>
    <footer>Her 3D formatı desteklenir (dosya boyutuna göre tahmin). Gerçek hacim için STL önerilir.</footer>
</div>

<script>
    const form = document.getElementById('quoteForm');
    const resultDiv = document.getElementById('result');
    const resultContent = document.getElementById('resultContent');
    const confirmBtn = document.getElementById('confirmBtn');
    const warningMsg = document.getElementById('warningMsg');
    let lastQuote = null;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const fileInput = document.getElementById('file');
        if (!fileInput.files.length) {
            alert('Lütfen bir dosya seçin');
            return;
        }

        resultDiv.style.display = 'none';
        const submitBtn = form.querySelector('button');
        const originalText = submitBtn.innerText;
        submitBtn.innerText = 'Hesaplanıyor...';
        submitBtn.disabled = true;

        try {
            const response = await fetch('/quote', { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) {
                lastQuote = data;
                resultContent.innerHTML = `
                    <p>📦 Ağırlık: <strong>${data.weight_g} g</strong> (tahmini)</p>
                    <p>⏱️ Baskı süresi: ~${data.print_minutes} dakika</p>
                    <p>🧵 Filament: ${data.filament_meters} metre</p>
                    <p>💰 Malzeme bedeli: ${data.breakdown.material_tl} TL</p>
                    <p>🎨 Renk ek ücreti: ${data.breakdown.color_fee_tl} TL</p>
                    <p>📦 Kargo: ${data.breakdown.shipping_tl} TL</p>
                    <p style="font-size: 22px; font-weight: bold;">🏷️ Toplam: ${data.price_tl} TL</p>
                `;
                warningMsg.innerText = '⚠️ Bu fiyat dosya boyutuna göre tahminidir. Kesin fiyat için STL dosyası yükleyiniz.';
                resultDiv.style.display = 'block';
            } else {
                alert('Hata: ' + data.error);
            }
        } catch (err) {
            alert('Sunucu hatası: ' + err.message);
        } finally {
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }
    });

    confirmBtn.addEventListener('click', () => {
        if (!lastQuote) return;
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const notes = document.getElementById('notes').value;
        const material = document.getElementById('material').value;
        const colorCount = document.getElementById('color_count').value;
        const quantity = document.getElementById('quantity').value;

        const subject = `SPEKTRUM Sipariş - ${name}`;
        const body = `Ad Soyad: ${name}
E-posta: ${email}
Telefon: ${phone}
Malzeme: ${material}
Renk sayısı: ${colorCount}
Adet: ${quantity}
Toplam fiyat: ${lastQuote.price_tl} TL
Ağırlık: ${lastQuote.weight_g} g (tahmini)
Notlar: ${notes}`;
        window.location.href = `mailto:korkmaz.x7@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        alert('Sipariş talebi e-posta ile gönderildi.');
    });
</script>
</body>
</html>
